version: '3.8'

services:
  mysql-testbed:
    image: mysql:8.0
    container_name: migration-test-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bucketstore_dummy
      TZ: Asia/Seoul
    volumes:
      - ./backend/data-generator/model.sql:/docker-entrypoint-initdb.d/1_schema.sql
      - ./backend/data-generator/insert.sql:/docker-entrypoint-initdb.d/2_insert.sql
      - mysql_data:/var/lib/mysql
    command:
      - --query_cache_type=0
      - --query_cache_size=0
      - --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data: